<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Vibrant Gradient A (Pink -> Orange) -->
    <linearGradient id="gradA" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>

    <!-- Vibrant Gradient B (Cyan -> Blue) -->
    <linearGradient id="gradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Vibrant Gradient C (Violet -> Pink) -->
    <linearGradient id="gradC" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Drop Shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.5" />
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Base rounded rectangle for structure -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" />

  <g transform="translate(64, 64) scale(0.9)" filter="url(#shadow)">
    <!-- Right overlapping ring (Cyan->Blue) -->
    <path d="M 213,28 C 309,28 386,105 386,201
             C 386,303 313,382 227,398
             A 64,64 0 0,1 213,270
             C 255,270 286,238 286,201
             C 286,155 253,128 213,128
             Z" 
          fill="url(#gradB)" />

    <!-- Left overlapping ring (Pink->Orange) -->
    <path d="M 213,398 C 117,398 40,321 40,225
             C 40,123 113,44 199,28
             A 64,64 0 0,1 213,156
             C 171,156 140,188 140,225
             C 140,271 173,298 213,298
             Z" 
          fill="url(#gradA)" />

    <!-- Central Infinity/Intersect Loop (Violet->Pink) -->
    <path d="M 213,128 
             C 160,128 140,170 140,225 
             C 140,280 180,298 213,298 
             C 266,298 286,256 286,201 
             C 286,146 246,128 213,128 Z" 
          fill="none" stroke="url(#gradC)" stroke-width="50" stroke-linecap="round" />
  </g>
</svg>
